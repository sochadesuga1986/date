<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>データ残量シミュレーター</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        h1 { font-size: 1.1rem; color: #666; margin-bottom: 0.5rem; }
        .today-date { font-size: 1.2rem; font-weight: bold; color: #333; margin-bottom: 1.5rem; }
        .remaining { font-size: 3rem; font-weight: bold; color: #007bff; margin: 1rem 0; }
        .unit { font-size: 1.2rem; }
        .info { font-size: 0.9rem; color: #666; line-height: 1.6; text-align: left; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 20px; }
        .progress-container { background: #eee; border-radius: 10px; height: 20px; margin: 20px 0; overflow: hidden; }
        .progress-bar { background: #007bff; height: 100%; transition: width 0.5s; }
        
        /* ボタンのスタイル */
        .reload-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            font-weight: bold;
        }
        .reload-btn:hover { background-color: #0056b3; }
        .reload-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <h1>今日時点の理想的な残量</h1>
    <div id="display-date" class="today-date">0000年00月00日</div>
    
    <div class="remaining" id="remain-val">--<span class="unit">GB</span></div>
    
    <div class="progress-container">
        <div class="progress-bar" id="bar" style="width: 0%"></div>
    </div>

    <div class="info">
        ・契約開始: 2026/03/18<br>
        ・有効期限: 2027/03/18<br>
        ・1日あたりの目安: <span id="daily-limit"></span> GB
    </div>

    <button class="reload-btn" onclick="location.reload()">最新の状態に更新</button>
</div>

<script>
    function updateCaclulation() {
        const totalGB = 1024; 
        const startDate = new Date('2026-03-18');
        const endDate = new Date('2027-03-18');
        const today = new Date();

        const y = today.getFullYear();
        const m = today.getMonth() + 1;
        const d = today.getDate();
        document.getElementById('display-date').innerText = `${y}年${m}月${d}日`;
        
        const totalDays = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24));
        const diffTime = today - startDate;
        const elapsedDays = Math.max(0, Math.floor(diffTime / (1000 * 60 * 60 * 24)));
        const remainingDays = Math.max(0, totalDays - elapsedDays);
        
        const idealRemaining = (remainingDays / totalDays) * totalGB;
        const percent = (idealRemaining / totalGB) * 100;

        document.getElementById('remain-val').innerHTML = idealRemaining.toFixed(2) + '<span class="unit">GB</span>';
        document.getElementById('bar').style.width = percent + '%';
        document.getElementById('daily-limit').innerText = (totalGB / totalDays).toFixed(2);
    }

    updateCaclulation();
</script>

</body>
</html>
